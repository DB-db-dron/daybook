<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daybook 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f7f7f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .view {
            display: none;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            position: absolute;
            top: 0;
            left: 0;
            background: #f7f7f7;
        }

        .view.active { display: flex; }

        .cash-in-text { color: #2e7d32; }
        .cash-out-text { color: #c62828; }
        .cash-in-bg { background-color: #1b5e20; }
        .cash-out-bg { background-color: #c62828; }

        .outlined-input-container {
            position: relative;
            margin-top: 10px;
        }
        .outlined-input-container label {
            position: absolute;
            top: -10px;
            left: 12px;
            background: white;
            padding: 0 4px;
            font-size: 12px;
            color: #9e9e9e;
            font-weight: 500;
            z-index: 10;
        }
        .outlined-input {
            width: 100%;
            border: 1.5px solid #e0e0e0;
            border-radius: 4px;
            padding: 12px;
            font-size: 16px;
            outline: none;
            color: #1a237e;
            background: white;
        }
        .outlined-input:focus { border-color: #4863d4 !important; }

        .tag-category {
            background-color: #f0f2ff;
            color: #3f51b5;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
        }
        .tag-payment {
            background-color: #e1f5fe;
            color: #0288d1;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
        }

        .category-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .category-card.selected { background-color: #f0f2ff; }
        .custom-radio {
            width: 22px; height: 22px; border: 2px solid #bdbdbd; border-radius: 50%;
            margin-right: 16px; display: flex; align-items: center; justify-content: center;
        }
        .selected .custom-radio { border-color: #3f51b5; }
        .radio-dot { width: 10px; height: 10px; background: #3f51b5; border-radius: 50%; display: none; }
        .selected .radio-dot { display: block; }

        .fixed-bottom { position: fixed; bottom: 0; width: 100%; z-index: 50; background: white; }
        
        .add-item-btn {
            width: 100%; border: 1px solid #d1d5db; color: #3f51b5;
            padding: 10px 16px; border-radius: 4px; font-weight: 500; font-size: 14px;
            display: flex; align-items: center; justify-content: center; background: #fff;
        }

        .picker-container { position: relative; display: flex; align-items: center; cursor: pointer; }
        .native-picker { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .settings-item {
            background: white;
            padding: 12px 16px;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="app-container">
        
        <!-- DASHBOARD VIEW -->
        <div id="view-dashboard" class="view active">
            <header class="bg-white border-b p-4 flex items-center justify-between sticky top-0 z-50">
                <div class="flex items-center">
                    <h1 class="font-bold text-xl text-indigo-700 tracking-tight">DayBook</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="navigateTo('settings')" class="text-gray-400"><i class="fa-solid fa-gear text-lg"></i></button>
                    <button onclick="showClearConfirm()" class="text-red-500 font-bold text-sm uppercase tracking-wide">Clear</button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto bg-gray-50 pb-32">
                <div class="bg-white border-b p-4">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-gray-800 font-bold">Net Balance</span>
                        <span id="summary-net" class="font-bold text-lg">0</span>
                    </div>
                    <hr class="opacity-10 mb-3">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-gray-600 text-sm font-medium">Total In (+)</span>
                        <span id="summary-in" class="cash-in-text font-bold">0</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600 text-sm font-medium">Total Out (-)</span>
                        <span id="summary-out" class="cash-out-text font-bold">0</span>
                    </div>
                    <button onclick="downloadCSV()" class="w-full mt-4 py-3 border-t text-blue-700 font-bold uppercase tracking-wider text-sm flex items-center justify-center">
                        SHARE <i class="fa-solid fa-share-nodes ml-2 text-xs"></i>
                    </button>
                </div>

                <div class="flex items-center justify-center my-4">
                    <hr class="w-16 opacity-10">
                    <span class="mx-3 text-[10px] font-bold text-gray-400 uppercase tracking-widest" id="entry-count-text">Showing 0 entries</span>
                    <hr class="w-16 opacity-10">
                </div>

                <div id="entries-list"></div>
            </main>

            <div class="fixed-bottom p-2 flex flex-col items-center pb-4">
                <div class="mb-4 -mt-10">
                    <div class="w-14 h-14 rounded-full bg-blue-600 flex items-center justify-center text-white shadow-lg border-4 border-white">
                        <i class="fa-solid fa-microphone text-xl"></i>
                    </div>
                </div>
                <div class="flex w-full gap-2 px-1">
                    <button onclick="openForm('in')" class="flex-1 cash-in-bg text-white py-3 rounded flex items-center justify-center font-bold">
                        <i class="fa-solid fa-plus mr-2"></i> CASH IN
                    </button>
                    <button onclick="openForm('out')" class="flex-1 cash-out-bg text-white py-3 rounded flex items-center justify-center font-bold">
                        <i class="fa-solid fa-minus mr-2"></i> CASH OUT
                    </button>
                </div>
            </div>
        </div>

        <!-- ADD ENTRY VIEW -->
        <div id="view-form" class="view">
            <header class="bg-white border-b p-4 flex items-center justify-between">
                <div class="flex items-center">
                    <button onclick="navigateTo('dashboard')" class="fa-solid fa-arrow-left mr-4 text-gray-600 text-lg"></button>
                    <h1 id="form-title" class="font-bold text-lg">Add Entry</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="btn-delete-entry" onclick="deleteCurrentEntry()" class="text-red-500 hidden">
                        <i class="fa-solid fa-trash-can text-lg"></i>
                    </button>
                    <button onclick="navigateTo('settings')" class="text-blue-600">
                        <i class="fa-solid fa-gear text-lg"></i>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto bg-white p-4 pb-24 space-y-4">
                <div class="flex border-b text-sm pb-3 justify-between text-gray-700">
                    <div class="picker-container">
                        <i class="fa-regular fa-calendar mr-2"></i> 
                        <span id="display-date"></span>
                        <input type="date" id="input-date-native" class="native-picker" onchange="updateTimestampDisplay()">
                    </div>
                    <div class="picker-container">
                        <i class="fa-regular fa-clock mr-2"></i> 
                        <span id="display-time"></span>
                        <input type="time" id="input-time-native" class="native-picker" onchange="updateTimestampDisplay()">
                    </div>
                </div>

                <div>
                    <button onclick="navigateTo('add-item')" class="add-item-btn mb-4">
                        <i class="fa-solid fa-plus mr-2 text-xs"></i> Add Item
                    </button>
                    <div id="items-container" class="space-y-2 mb-4"></div>
                </div>

                <div class="outlined-input-container">
                    <input type="number" id="input-amount" class="outlined-input" placeholder=" " inputmode="decimal">
                    <label>Amount *</label>
                </div>

                <div class="outlined-input-container">
                    <input type="text" id="input-remark" class="outlined-input" placeholder=" ">
                    <label>Remark</label>
                </div>

                <div class="outlined-input-container" onclick="navigateTo('category')">
                    <input type="text" id="display-category" class="outlined-input cursor-pointer" readonly placeholder=" ">
                    <label>Category</label>
                    <i class="fa-solid fa-caret-down absolute right-4 top-4 text-gray-400"></i>
                </div>

                <div>
                    <p class="text-xs font-bold text-gray-400 mb-2 uppercase">Payment Mode</p>
                    <div id="payment-modes-container" class="flex flex-wrap gap-2"></div>
                </div>
            </main>

            <footer class="fixed-bottom flex border-t">
                <button class="flex-1 py-4 border-r text-blue-800 font-bold text-sm">SAVE & ADD NEW</button>
                <button onclick="saveEntry()" class="flex-1 py-4 bg-indigo-600 text-white font-bold text-sm">SAVE</button>
            </footer>
        </div>

        <!-- CATEGORY SELECTION VIEW -->
        <div id="view-category" class="view">
            <header class="bg-white border-b p-4 flex items-center justify-between">
                <div class="flex items-center">
                    <button onclick="navigateTo('form')" class="fa-solid fa-arrow-left mr-6 text-gray-700 text-lg"></button>
                    <h1 class="font-bold text-lg text-gray-800">Choose Category</h1>
                </div>
                <button onclick="navigateTo('settings')" class="text-blue-600"><i class="fa-solid fa-gear"></i></button>
            </header>
            <main class="flex-1 overflow-y-auto p-4">
                <div id="category-cards-container"></div>
            </main>
        </div>

        <!-- ADD ITEM VIEW -->
        <div id="view-add-item" class="view">
            <header class="bg-white border-b p-4 flex items-center">
                <button onclick="navigateTo('form')" class="fa-solid fa-arrow-left mr-6 text-gray-700 text-lg"></button>
                <h1 class="font-bold text-lg text-gray-800">Add Item Information</h1>
            </header>
            <main class="flex-1 overflow-y-auto bg-white p-6 space-y-8">
                <div class="outlined-input-container">
                    <input type="text" id="modal-item-name" class="outlined-input" placeholder=" ">
                    <label>Item Name *</label>
                </div>
                <div class="outlined-input-container">
                    <input type="text" id="modal-item-code" class="outlined-input" placeholder=" " oninput="validateItemCode(this)">
                    <label>Item Code</label>
                </div>
                <div class="outlined-input-container">
                    <input type="number" id="modal-item-price" class="outlined-input" placeholder=" " inputmode="decimal">
                    <label>Price *</label>
                </div>
            </main>
            <footer class="fixed-bottom p-4 border-t flex gap-4">
                <button onclick="navigateTo('form')" class="flex-1 py-3 text-gray-500 font-bold text-sm uppercase">Cancel</button>
                <button onclick="addItemToList()" class="flex-1 py-3 bg-blue-600 text-white rounded font-bold text-sm uppercase shadow-md">Add Item</button>
            </footer>
        </div>

        <!-- SETTINGS VIEW -->
        <div id="view-settings" class="view">
            <header class="bg-white border-b p-4 flex items-center">
                <button onclick="navigateTo('dashboard')" class="fa-solid fa-arrow-left mr-6 text-gray-700 text-lg"></button>
                <h1 class="font-bold text-lg text-gray-800">Preferences</h1>
            </header>
            <main class="flex-1 overflow-y-auto p-4 space-y-8">
                <div>
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-bold text-gray-600 uppercase text-xs">Manage Categories</h2>
                        <button onclick="promptAddItem('category')" class="text-blue-600 text-xs font-bold">+ ADD NEW</button>
                    </div>
                    <div id="settings-categories-list" class="rounded-lg overflow-hidden border"></div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-bold text-gray-600 uppercase text-xs">Manage Payment Modes</h2>
                        <button onclick="promptAddItem('mode')" class="text-blue-600 text-xs font-bold">+ ADD NEW</button>
                    </div>
                    <div id="settings-modes-list" class="rounded-lg overflow-hidden border"></div>
                </div>
            </main>
        </div>

    </div>

    <!-- CUSTOM CONFIRMATION MODAL -->
    <div id="clear-confirm-modal" class="modal-overlay">
        <div class="bg-white rounded-lg p-6 max-w-[85vw] shadow-2xl">
            <h3 class="font-bold text-gray-800 text-lg mb-2">Delete All Entries?</h3>
            <p class="text-gray-500 text-sm mb-6">This action cannot be undone. All your financial records will be permanently deleted.</p>
            <div class="flex justify-end space-x-4">
                <button onclick="hideClearConfirm()" class="text-gray-600 font-bold text-sm uppercase tracking-wide px-4 py-2">Cancel</button>
                <button onclick="confirmClearAllData()" class="text-red-600 font-bold text-sm uppercase tracking-wide px-4 py-2">Delete All</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'daybook_entries_data';
        const PREFS_KEY = 'daybook_preferences';

        let entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let prefs = JSON.parse(localStorage.getItem(PREFS_KEY)) || {
            categories: ['No Category', '📖 Due paid', 'Sports 🏋️', 'Studio 📷', 'Expense 📈', 'Cash Online exchange 💱'],
            paymentModes: ['Cash', 'Paytm Business', 'Online', 'Bank Transfer']
        };
        
        let currentEntryItems = [];
        let currentType = 'out';
        let currentCategory = "No Category";
        let currentPaymentMode = "Cash";
        let editingEntryId = null;

        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        function saveToLocalStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
        }

        function savePrefs() {
            localStorage.setItem(PREFS_KEY, JSON.stringify(prefs));
        }

        function showClearConfirm() {
            document.getElementById('clear-confirm-modal').style.display = 'flex';
        }

        function hideClearConfirm() {
            document.getElementById('clear-confirm-modal').style.display = 'none';
        }

        function confirmClearAllData() {
            entries = [];
            saveToLocalStorage();
            renderDashboard();
            hideClearConfirm();
        }

        function validateItemCode(input) {
            let val = input.value.toUpperCase();
            val = val.replace(/[^PRICELASTO0]/g, '');
            input.value = val;
        }

        function navigateTo(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            const target = document.getElementById('view-' + viewName);
            if(target) target.classList.add('active');
            
            if (viewName === 'category') renderCategoryCards();
            if (viewName === 'settings') renderSettings();
            if (viewName === 'dashboard') {
                editingEntryId = null;
                document.getElementById('btn-delete-entry').classList.add('hidden');
            }
        }

        function renderSettings() {
            const catList = document.getElementById('settings-categories-list');
            const modeList = document.getElementById('settings-modes-list');

            catList.innerHTML = prefs.categories.map((cat, idx) => `
                <div class="settings-item">
                    <span class="text-sm font-medium text-gray-700">${cat}</span>
                    <button onclick="removePrefItem('categories', ${idx})" class="text-red-400 p-2"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');

            modeList.innerHTML = prefs.paymentModes.map((mode, idx) => `
                <div class="settings-item">
                    <span class="text-sm font-medium text-gray-700">${mode}</span>
                    <button onclick="removePrefItem('paymentModes', ${idx})" class="text-red-400 p-2"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
        }

        function promptAddItem(type) {
            const name = prompt(`Enter new ${type === 'category' ? 'category' : 'payment mode'} name:`);
            if (name && name.trim()) {
                if (type === 'category') prefs.categories.push(name.trim());
                else prefs.paymentModes.push(name.trim());
                savePrefs();
                renderSettings();
            }
        }

        function removePrefItem(type, index) {
            if (prefs[type].length <= 1) return;
            prefs[type].splice(index, 1);
            savePrefs();
            renderSettings();
        }

        function renderCategoryCards() {
            const container = document.getElementById('category-cards-container');
            container.innerHTML = prefs.categories.map(cat => `
                <div class="category-card ${currentCategory === cat ? 'selected' : ''}" onclick="selectCategory('${cat}')">
                    <div class="custom-radio"><div class="radio-dot"></div></div>
                    <span class="text-gray-800 font-medium">${cat}</span>
                </div>
            `).join('');
        }

        function selectCategory(label) {
            currentCategory = label;
            document.getElementById('display-category').value = label;
            navigateTo('form');
        }

        function renderPaymentModes() {
            const container = document.getElementById('payment-modes-container');
            container.innerHTML = prefs.paymentModes.map(mode => `
                <div id="pay-mode-${mode.replace(/\s+/g, '-').toLowerCase()}" 
                     onclick="setPaymentMode('${mode}')" 
                     class="px-5 py-2 rounded-full text-sm font-medium border transition-colors cursor-pointer ${currentPaymentMode === mode ? 'bg-blue-700 text-white border-blue-700' : 'bg-gray-100 text-gray-600 border-gray-100'}">
                    ${mode}
                </div>
            `).join('');
        }

        function openForm(type, id = null) {
            editingEntryId = id;
            const delBtn = document.getElementById('btn-delete-entry');
            
            if (id) {
                const entry = entries.find(e => e.id === id);
                if (!entry) return;
                currentType = entry.type;
                currentEntryItems = JSON.parse(JSON.stringify(entry.items));
                currentCategory = entry.category;
                currentPaymentMode = entry.mode;
                document.getElementById('input-amount').value = entry.amount;
                document.getElementById('input-remark').value = entry.remark;
                document.getElementById('display-category').value = entry.category;
                const dParts = entry.date.split('/');
                document.getElementById('input-date-native').value = `${dParts[2]}-${dParts[1]}-${dParts[0]}`;
                const tMatch = entry.time.match(/(\d+):(\d+)\s*(am|pm)/i);
                if (tMatch) {
                    let h = parseInt(tMatch[1]);
                    if (tMatch[3].toLowerCase() === 'pm' && h < 12) h += 12;
                    if (tMatch[3].toLowerCase() === 'am' && h === 12) h = 0;
                    document.getElementById('input-time-native').value = `${String(h).padStart(2, '0')}:${tMatch[2]}`;
                }
                document.getElementById('form-title').innerText = currentType === 'in' ? "Edit Cash In Entry" : "Edit Cash Out Entry";
                delBtn.classList.remove('hidden');
            } else {
                currentType = type;
                currentEntryItems = [];
                currentCategory = prefs.categories[0] || "No Category";
                currentPaymentMode = prefs.paymentModes[0] || "Cash";
                document.getElementById('input-amount').value = "";
                document.getElementById('input-remark').value = "";
                document.getElementById('display-category').value = currentCategory;
                const now = new Date();
                document.getElementById('input-date-native').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                document.getElementById('input-time-native').value = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                document.getElementById('form-title').innerText = type === 'in' ? "Add Cash In Entry" : "Add Cash Out Entry";
                delBtn.classList.add('hidden');
            }
            const title = document.getElementById('form-title');
            title.className = `font-bold text-lg ${currentType === 'in' ? 'text-green-700' : 'text-red-600'}`;
            renderPaymentModes();
            updateTimestampDisplay();
            renderEntryItems();
            navigateTo('form');
        }

        function deleteCurrentEntry() {
            if (editingEntryId && confirm("Delete this specific entry?")) {
                entries = entries.filter(e => e.id !== editingEntryId);
                saveToLocalStorage();
                renderDashboard();
                navigateTo('dashboard');
            }
        }

        function updateTimestampDisplay() {
            const dateVal = document.getElementById('input-date-native').value;
            const timeVal = document.getElementById('input-time-native').value;
            if(dateVal) {
                const parts = dateVal.split('-');
                document.getElementById('display-date').innerText = `${parts[2]}/${parts[1]}/${parts[0]}`;
            }
            if(timeVal) {
                const parts = timeVal.split(':');
                let h = parseInt(parts[0]);
                const ampm = h >= 12 ? 'pm' : 'am';
                let displayH = h % 12 || 12;
                document.getElementById('display-time').innerText = `${displayH}:${parts[1]} ${ampm}`;
            }
        }

        function addItemToList() {
            const nameEl = document.getElementById('modal-item-name');
            const codeEl = document.getElementById('modal-item-code');
            const priceEl = document.getElementById('modal-item-price');
            const name = nameEl.value;
            const price = parseFloat(priceEl.value) || 0;
            const code = codeEl.value;
            if (!name) return;
            currentEntryItems.push({ id: Date.now(), name, price, code });
            document.getElementById('input-amount').value = currentEntryItems.reduce((acc, item) => acc + item.price, 0);
            nameEl.value = ""; codeEl.value = ""; priceEl.value = "";
            renderEntryItems();
            navigateTo('form');
        }

        function renderEntryItems() {
            const container = document.getElementById('items-container');
            if (currentEntryItems.length === 0) { container.innerHTML = ''; return; }
            container.innerHTML = [...currentEntryItems].reverse().map((item, idx) => `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded border border-gray-200">
                    <div>
                        <div class="text-sm font-bold text-gray-800">${item.name}</div>
                        <div class="text-[10px] text-gray-500">Code: ${item.code || 'N/A'}</div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-sm font-bold text-blue-700">${item.price.toLocaleString()}</span>
                        <button onclick="removeItem(${currentEntryItems.indexOf(item)})" class="text-red-400"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>`).join('');
        }

        function removeItem(index) {
            currentEntryItems.splice(index, 1);
            document.getElementById('input-amount').value = currentEntryItems.reduce((acc, i) => acc + i.price, 0) || "";
            renderEntryItems();
        }

        function setPaymentMode(mode) {
            currentPaymentMode = mode;
            renderPaymentModes();
        }

        function saveEntry() {
            const amt = parseFloat(document.getElementById('input-amount').value);
            if (!amt) return;
            const entryData = {
                type: currentType, 
                amount: amt, 
                remark: document.getElementById('input-remark').value,
                category: currentCategory, 
                items: [...currentEntryItems], 
                date: document.getElementById('display-date').innerText,
                time: document.getElementById('display-time').innerText, 
                mode: currentPaymentMode, 
                timestamp: editingEntryId ? entries.find(e => e.id === editingEntryId).timestamp : Date.now(),
                id: editingEntryId || Date.now()
            };
            if (editingEntryId) {
                const index = entries.findIndex(e => e.id === editingEntryId);
                entries[index] = entryData;
            } else {
                entries.push(entryData);
            }
            saveToLocalStorage();
            renderDashboard();
            navigateTo('dashboard');
            editingEntryId = null;
        }

        function renderDashboard() {
            const list = document.getElementById('entries-list');
            const countText = document.getElementById('entry-count-text');
            if (entries.length === 0) {
                list.innerHTML = '<div class="text-center py-10 text-gray-400">No entries found!</div>';
                document.getElementById('summary-in').innerText = "0";
                document.getElementById('summary-out').innerText = "0";
                document.getElementById('summary-net').innerText = "0";
                countText.innerText = "Showing 0 entries";
                return;
            }
            let running = 0; let totalIn = 0; let totalOut = 0;
            const chronological = [...entries].sort((a,b) => a.timestamp - b.timestamp);
            chronological.forEach(e => {
                if(e.type === 'in') { running += e.amount; totalIn += e.amount; }
                else { running -= e.amount; totalOut += e.amount; }
                e.runningBalance = running;
            });
            document.getElementById('summary-in').innerText = totalIn.toLocaleString();
            document.getElementById('summary-out').innerText = totalOut.toLocaleString();
            const net = totalIn - totalOut;
            document.getElementById('summary-net').innerText = net.toLocaleString();
            document.getElementById('summary-net').className = `font-bold text-lg ${net >= 0 ? 'text-green-700' : 'text-red-700'}`;
            countText.innerText = `Showing ${entries.length} entries`;
            const displayList = [...chronological].reverse();
            let currentHeaderDate = ""; let html = "";
            displayList.forEach(e => {
                if(e.date !== currentHeaderDate) {
                    currentHeaderDate = e.date;
                    const dateParts = e.date.split('/');
                    const d = new Date(`${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`);
                    const dateString = d.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
                    html += `<div class="p-4 text-xs font-bold text-gray-500">${dateString}</div>`;
                }
                const itemDetails = e.items.map(i => `${i.name}@${i.code||''}@${i.price}`).join('\n');
                html += `
                <div class="bg-white p-4 mb-2 shadow-sm cursor-pointer active:bg-gray-50 transition-colors" onclick="openForm(null, ${e.id})">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex gap-2">
                            <span class="tag-category">${e.category}</span>
                            <span class="tag-payment">${e.mode}</span>
                        </div>
                        <div class="text-right">
                            <div class="font-bold text-lg ${e.type === 'in' ? 'cash-in-text' : 'cash-out-text'}">
                                ${e.amount.toLocaleString()}
                            </div>
                            <div class="text-[10px] text-gray-400">Balance: ${e.runningBalance.toLocaleString()}</div>
                        </div>
                    </div>
                    ${itemDetails ? `<div class="text-sm text-gray-700 whitespace-pre-line mb-2">${itemDetails}</div>` : ''}
                    ${e.remark ? `<div class="text-sm text-gray-600 italic mb-2">Remarks: ${e.remark}</div>` : ''}
                    <div class="text-[11px] text-blue-700 mt-2 pt-2 border-t border-gray-50 flex justify-between items-center">
                        <span><span class="font-bold">Entry by You</span> at ${e.time}</span>
                        <i class="fa-solid fa-pen text-[9px] opacity-30"></i>
                    </div>
                </div>`;
            });
            list.innerHTML = html;
        }

        function formatCSVDate(dateStr) {
            const [d, m, y] = dateStr.split('/');
            const monthName = months[parseInt(m) - 1];
            return `${d.padStart(2, '0')} ${monthName} ${y}`;
        }

        function downloadCSV() {
            if (entries.length === 0) return;
            const headers = ["Date", "Time", "Remark", "Category", "Mode", "Cash In", "Cash Out"];
            const escape = (val) => {
                if (val === undefined || val === null) return '""';
                let str = String(val);
                str = str.replace(/"/g, '""');
                return `"${str}"`;
            };
            const rows = [...entries].sort((a,b) => a.timestamp - b.timestamp).map(e => {
                const itemDetails = e.items.map(i => `${i.name}@${i.code||''}@${i.price}`).join('\n');
                
                // NEW SANITIZATION LOGIC
                const itemBlock = itemDetails ? itemDetails : "";
                const remarkBlock = e.remark ? `Remarks: ${e.remark}` : "";
                const finalRemark = (itemBlock && remarkBlock) ? `${itemBlock}\n\n${remarkBlock}` : (itemBlock || remarkBlock);

                // Check for placeholder "No Category"
                const csvCategory = (e.category === "No Category" || !e.category) ? "" : e.category;
                const csvMode = !e.mode ? "" : e.mode;

                return [
                    escape(formatCSVDate(e.date)),
                    escape(e.time.toUpperCase()), 
                    escape(finalRemark),
                    escape(csvCategory),
                    escape(csvMode),
                    e.type === 'in' ? e.amount : "",
                    e.type === 'out' ? e.amount : ""
                ].join(",");
            });
            const csvContent = [headers.join(","), ...rows].join("\n");
            const BOM = "\uFEFF";
            const blob = new Blob([BOM + csvContent], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `Daybook_Export_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.onload = renderDashboard;
    </script>
</body>
</html>
